<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クイズ — Practice Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="assets/css/common.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-init.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/nav.js"></script>
  <style>
    .level-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--color-border);
      padding-bottom: 0;
    }
    .level-tab {
      padding: 10px 20px;
      border: none;
      background: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--color-text-muted);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .level-tab.active[data-level=beginner]     { color: var(--color-success); border-color: var(--color-success); }
    .level-tab.active[data-level=intermediate] { color: var(--color-warning); border-color: var(--color-warning); }
    .level-tab.active[data-level=advanced]     { color: var(--color-danger);  border-color: var(--color-danger); }
    .level-tab:hover { color: var(--color-text); }

    .quiz-stats {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .quiz-stat {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 10px 16px;
      flex: 1;
      min-width: 100px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .quiz-stat-val { font-size: 1.3rem; font-weight: 700; }
    .quiz-stat-label { font-size: 0.75rem; color: var(--color-text-muted); }

    .problem-card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-sm);
      padding: 18px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .problem-card.review-due {
      border-left: 4px solid var(--color-warning);
    }
    .problem-title { font-weight: 600; font-size: 0.95rem; }
    .problem-meta  { font-size: 0.78rem; color: var(--color-text-muted); margin-top: 4px; }
    .problem-actions { flex-shrink: 0; }
    .review-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(245,158,11,0.12);
      color: var(--color-warning);
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="dashboard.html" class="nav-brand"><i class="fa-solid fa-fire"></i> Practice Portal</a>
  <ul class="nav-links">
    <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> ダッシュボード</a></li>
    <li><a href="tasks.html"><i class="fa-solid fa-list-check"></i> タスク</a></li>
    <li><a href="quiz.html"><i class="fa-solid fa-circle-question"></i> クイズ</a></li>
    <li><a href="mindmap.html"><i class="fa-solid fa-diagram-project"></i> マップ</a></li>
  </ul>
  <div class="nav-user">
    <span class="nav-user-name">---</span>
    <button class="btn btn-ghost btn-sm nav-logout-btn"><i class="fa-solid fa-right-from-bracket"></i></button>
    <button class="nav-toggle" id="nav-toggle"><i class="fa-solid fa-bars"></i></button>
  </div>
</nav>

<div class="nav-mobile-menu" id="nav-mobile-menu">
  <a href="dashboard.html"><i class="fa-solid fa-house"></i> ダッシュボード</a>
  <a href="tasks.html"><i class="fa-solid fa-list-check"></i> タスク管理</a>
  <a href="quiz.html"><i class="fa-solid fa-circle-question"></i> クイズ</a>
  <a href="mindmap.html"><i class="fa-solid fa-diagram-project"></i> マインドマップ</a>
  <div class="divider"></div>
  <a href="#" class="nav-logout-btn" style="color:var(--color-text-muted)"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</a>
</div>

<main class="page">
  <div class="container">

    <div id="loading" class="loading-wrap"><div class="spinner"></div><span>読み込み中...</span></div>

    <div id="content" style="display:none">
      <h2 class="section-title"><i class="fa-solid fa-circle-question"></i> クイズ</h2>

      <!-- レベルタブ -->
      <div class="level-tabs">
        <button class="level-tab active" data-level="beginner"><i class="fa-solid fa-seedling"></i> 初級</button>
        <button class="level-tab" data-level="intermediate"><i class="fa-solid fa-fire-flame-simple"></i> 中級</button>
        <button class="level-tab" data-level="advanced"><i class="fa-solid fa-bolt"></i> 上級</button>
        <button class="level-tab" data-level="all" style="margin-left:auto"><i class="fa-solid fa-list"></i> 全て</button>
      </div>

      <!-- 統計 -->
      <div class="quiz-stats" id="quiz-stats"></div>

      <!-- 問題一覧 -->
      <div id="problem-list"></div>
      <div id="empty-quiz" class="empty-state" style="display:none">
        <i class="fa-solid fa-inbox"></i>
        <p>この難易度の問題はありません</p>
      </div>
    </div>
  </div>
</main>

<script>
  let _profile = null;
  let _problems = [];
  let _quizProgress = {}; // problem_id → progress
  let _currentLevel = 'beginner';

  const LEVEL_LABELS = { beginner: '初級', intermediate: '中級', advanced: '上級' };
  const REVIEW_INTERVALS = [1, 3, 7, 14, 30]; // 忘却曲線 (日数)

  function calcNextReview(attemptCount) {
    const idx = Math.min(attemptCount, REVIEW_INTERVALS.length - 1);
    const days = REVIEW_INTERVALS[idx];
    const d = new Date();
    d.setDate(d.getDate() + days);
    return d.toISOString();
  }

  function renderStats(filtered) {
    const total     = filtered.length;
    const completed = filtered.filter(p => _quizProgress[p.id]?.completed).length;
    const now       = new Date();
    const reviewDue = filtered.filter(p => {
      const r = _quizProgress[p.id]?.next_review_at;
      return r && new Date(r) <= now;
    }).length;
    const avgScore  = (() => {
      const scores = filtered.map(p => _quizProgress[p.id]?.best_score).filter(s => s != null);
      if (!scores.length) return '-';
      return Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) + '%';
    })();

    document.getElementById('quiz-stats').innerHTML = `
      <div class="quiz-stat"><div class="quiz-stat-val" style="color:var(--color-primary)">${completed}/${total}</div><div class="quiz-stat-label">完了</div></div>
      <div class="quiz-stat"><div class="quiz-stat-val" style="color:var(--color-warning)">${reviewDue}</div><div class="quiz-stat-label">復習待ち</div></div>
      <div class="quiz-stat"><div class="quiz-stat-val" style="color:var(--color-success)">${avgScore}</div><div class="quiz-stat-label">平均スコア</div></div>
    `;
  }

  function renderProblems(filtered) {
    const list  = document.getElementById('problem-list');
    const empty = document.getElementById('empty-quiz');
    if (!filtered.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    const now = new Date();

    list.innerHTML = filtered.map(p => {
      const prog      = _quizProgress[p.id];
      const completed = prog?.completed;
      const score     = prog?.best_score;
      const attempts  = prog?.attempt_count || 0;
      const reviewAt  = prog?.next_review_at ? new Date(prog.next_review_at) : null;
      const isDue     = reviewAt && reviewAt <= now;
      const lvColor   = p.level === 'beginner' ? 'var(--color-success)' : p.level === 'intermediate' ? 'var(--color-warning)' : 'var(--color-danger)';

      const reviewBadge = isDue
        ? `<div class="review-badge"><i class="fa-solid fa-rotate"></i> 復習タイミング</div>`
        : reviewAt
        ? `<div style="font-size:0.75rem; color:var(--color-text-muted)">次回: ${reviewAt.toLocaleDateString('ja-JP')}</div>`
        : '';

      const metaParts = [
        `<span class="badge" style="background:${lvColor}22; color:${lvColor}">${LEVEL_LABELS[p.level]}</span>`,
        attempts > 0 ? `挑戦: ${attempts}回` : '未挑戦',
        score != null ? `最高スコア: ${score}%` : '',
      ].filter(Boolean).join(' &nbsp;·&nbsp; ');

      return `
        <div class="problem-card ${isDue ? 'review-due' : ''}">
          <div style="flex:1; min-width:0">
            ${reviewBadge}
            <div class="problem-title">${p.title}</div>
            <div class="problem-meta">${metaParts}</div>
          </div>
          <div class="problem-actions">
            <a href="quiz_play.html?id=${p.id}" class="btn ${isDue ? 'btn-primary' : 'btn-ghost'} btn-sm">
              <i class="fa-solid fa-play"></i> ${completed ? '復習' : '挑戦'}
            </a>
          </div>
        </div>`;
    }).join('');
  }

  function filterAndRender() {
    const filtered = _currentLevel === 'all'
      ? _problems
      : _problems.filter(p => p.level === _currentLevel);
    renderStats(filtered);
    renderProblems(filtered);
  }

  // BroadcastChannel で quiz_play.html から結果を受け取る
  const bc = new BroadcastChannel('quiz-result');
  bc.onmessage = async (e) => {
    const { problemId, score, attemptCount } = e.data;
    const nextReview = calcNextReview(attemptCount);
    const updated = await API.upsertQuizProgress(_profile.id, problemId, {
      score,
      best_score: Math.max(score, _quizProgress[problemId]?.best_score || 0),
      completed: score >= 60,
      completed_at: new Date().toISOString(),
      attempt_count: attemptCount,
      next_review_at: nextReview,
    });
    _quizProgress[problemId] = updated;
    filterAndRender();
  };

  (async () => {
    const auth = await Auth.requireAuth();
    if (!auth) return;
    _profile = auth.profile;

    Nav.init();
    Nav.setUserName(_profile.display_name);

    const [problems, progress] = await Promise.all([
      API.getQuizProblems(),
      API.getUserQuizProgress(_profile.id),
    ]);

    _problems = problems;
    progress.forEach(p => _quizProgress[p.problem_id] = p);

    // タブ切り替え
    document.querySelectorAll('.level-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        _currentLevel = tab.dataset.level;
        filterAndRender();
      });
    });

    filterAndRender();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — Practice Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-init.js"></script>
  <script src="assets/js/auth.js"></script>
  <style>
    :root {
      --color-primary: #ff6b35;
      --color-primary-dk: #e05a2e;
      --color-grad-start: #667eea;
      --color-grad-end: #764ba2;
      --color-border: #e9ecef;
      --color-text: #212529;
      --color-text-muted: #6c757d;
      --radius-md: 10px;
      --radius-lg: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-grad-start) 0%, var(--color-grad-end) 100%);
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    }
    .auth-card {
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      margin: 20px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo-icon {
      font-size: 2.4rem;
      color: var(--color-primary);
    }
    .auth-logo h1 {
      margin: 8px 0 4px;
      font-size: 1.5rem;
      color: var(--color-text);
    }
    .auth-logo p {
      margin: 0;
      color: var(--color-text-muted);
      font-size: 0.85rem;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(255,107,53,0.12);
    }
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:hover { background: var(--color-primary-dk); }
    .btn-primary:disabled { opacity: 0.6; pointer-events: none; }
    .alert {
      padding: 11px 14px;
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      font-size: 0.88rem;
    }
    .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .section { display: none; }
    .section.active { display: block; }
    .step-indicator {
      text-align: center;
      font-size: 0.82rem;
      color: var(--color-text-muted);
      margin-bottom: 20px;
    }
    .step-indicator span {
      display: inline-block;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--color-border);
      color: var(--color-text-muted);
      line-height: 24px;
      margin: 0 4px;
      font-size: 0.8rem;
    }
    .step-indicator span.done {
      background: var(--color-primary);
      color: #fff;
    }
    .divider {
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.8rem;
      margin: 8px 0 4px;
    }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon"><i class="fa-solid fa-fire"></i></div>
    <h1>Practice Portal</h1>
    <p>チーム学習・訓練管理システム</p>
  </div>

  <!-- ① メール入力（Magic Link 送信） -->
  <div id="section-email" class="section active">
    <div id="alert-email" class="alert" style="display:none"></div>
    <div class="form-group">
      <label class="form-label">メールアドレス</label>
      <input type="email" id="input-email" class="form-input" placeholder="your@email.com" autocomplete="email">
    </div>
    <button id="btn-send-magic" class="btn-primary">
      <i class="fa-solid fa-paper-plane"></i> Magic Link を送信
    </button>
    <div class="divider" style="margin-top:16px">メールのリンクをクリックするだけでログインできます</div>
  </div>

  <!-- ② 送信完了 -->
  <div id="section-sent" class="section">
    <div style="text-align:center; padding: 8px 0 20px;">
      <i class="fa-solid fa-envelope-open-text" style="font-size:2.5rem; color:var(--color-primary); margin-bottom:12px; display:block"></i>
      <p style="margin:0 0 8px; font-weight:700; font-size:1.05rem">メールを送信しました</p>
      <p style="margin:0; color:var(--color-text-muted); font-size:0.88rem">メール内のリンクをクリックしてください。<br>届かない場合は迷惑メールをご確認ください。</p>
    </div>
    <button id="btn-resend" class="btn-primary" style="background:#6c757d">
      <i class="fa-solid fa-rotate-right"></i> 再送信
    </button>
  </div>

  <!-- ③ 初回セットアップ（profiles 未作成の場合） -->
  <div id="section-setup" class="section">
    <div class="step-indicator">
      <span class="done">1</span> → <span class="done">2</span> → <span>3</span>
    </div>
    <p style="text-align:center; color:var(--color-text-muted); font-size:0.88rem; margin:0 0 20px">招待コードと表示名を入力してください</p>
    <div id="alert-setup" class="alert" style="display:none"></div>
    <div class="form-group">
      <label class="form-label">招待コード</label>
      <input type="text" id="input-invite-code" class="form-input" placeholder="XXXXXXXX" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">表示名</label>
      <input type="text" id="input-display-name" class="form-input" placeholder="例: 田中" maxlength="20">
    </div>
    <button id="btn-setup" class="btn-primary">
      <i class="fa-solid fa-check"></i> 登録して始める
    </button>
  </div>
</div>

<script>
  const emailSection  = document.getElementById('section-email');
  const sentSection   = document.getElementById('section-sent');
  const setupSection  = document.getElementById('section-setup');
  const alertEmail    = document.getElementById('alert-email');
  const alertSetup    = document.getElementById('alert-setup');

  function showSection(id) {
    [emailSection, sentSection, setupSection].forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showAlert(el, type, msg) {
    el.className = `alert alert-${type}`;
    el.textContent = msg;
    el.style.display = 'block';
  }

  // Magic Link 送信
  document.getElementById('btn-send-magic').addEventListener('click', async () => {
    const email = document.getElementById('input-email').value.trim();
    if (!email) { showAlert(alertEmail, 'error', 'メールアドレスを入力してください'); return; }
    const btn = document.getElementById('btn-send-magic');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 送信中...';
    try {
      await Auth.sendMagicLink(email);
      showSection('section-sent');
    } catch(e) {
      showAlert(alertEmail, 'error', e.message || '送信に失敗しました');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Magic Link を送信';
    }
  });

  // Enterキー対応
  document.getElementById('input-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-send-magic').click();
  });

  // 再送信
  document.getElementById('btn-resend').addEventListener('click', () => showSection('section-email'));

  // セットアップ実行
  document.getElementById('btn-setup').addEventListener('click', async () => {
    const code = document.getElementById('input-invite-code').value.trim();
    const name = document.getElementById('input-display-name').value.trim();
    if (!code) { showAlert(alertSetup, 'error', '招待コードを入力してください'); return; }
    if (!name) { showAlert(alertSetup, 'error', '表示名を入力してください'); return; }
    const btn = document.getElementById('btn-setup');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 登録中...';
    try {
      await Auth.bootstrapUser(code, name);
      window.location.href = 'dashboard.html';
    } catch(e) {
      showAlert(alertSetup, 'error', e.message || '登録に失敗しました');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-check"></i> 登録して始める';
    }
  });

  // Magic Link でリダイレクト後の処理
  Auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      const profile = await Auth.getProfile(session.user.id);
      if (profile) {
        window.location.href = 'dashboard.html';
      } else {
        showSection('section-setup');
      }
    }
  });

  // URLパラメータ ?setup=1 で初回セットアップ画面を直接表示
  (async () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('setup') === '1') {
      const session = await Auth.getSession();
      if (session) { showSection('section-setup'); return; }
    }
    // すでにログイン済みで profiles あり → dashboard へ
    const session = await Auth.getSession();
    if (session) {
      const profile = await Auth.getProfile(session.user.id);
      if (profile) window.location.href = 'dashboard.html';
    }
  })();
</script>
</body>
</html>
